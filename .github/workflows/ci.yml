name: CI — Exploit Subnet

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 06:00 UTC — security scans

env:
  FOUNDRY_PROFILE: default
  PYTHONHASHSEED: "0"

jobs:
  # ── Solidity Contracts ───────────────────────────────────────────────────
  foundry:
    name: Foundry Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly-2024-12-01
          cache: true

      - name: Check Foundry versions
        run: |
          forge --version
          anvil --version
          cast --version

      - name: Compile contracts
        run: forge build --sizes

      - name: Run contract tests
        run: forge test -vvv

      - name: Run exploit tests
        run: FOUNDRY_PROFILE=exploits forge test -vvv

      - name: Check test gas snapshots
        run: forge snapshot --check || true

  # ── Python Pipeline ──────────────────────────────────────────────────────
  python:
    name: Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly-2024-12-01
          cache: true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create module symlinks
        run: |
          ln -sf task-generator task_generator
          ln -sf subnet-adapter subnet_adapter

      - name: Run integration tests
        run: PYTHONHASHSEED=0 python -m pytest tests/test_integration.py -v --timeout=120

      - name: Run pipeline tests
        run: PYTHONHASHSEED=0 python -m pytest tests/test_pipeline.py -v --timeout=120

      - name: Run live Anvil tests
        run: PYTHONHASHSEED=0 python -m pytest tests/test_live_anvil.py -v --timeout=120

      - name: Run extended tests (pytest)
        run: PYTHONHASHSEED=0 python -m pytest tests/test_extended.py -v --timeout=60

  # ── Determinism Verification ─────────────────────────────────────────────
  determinism:
    name: Determinism Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly-2024-12-01

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Create module symlinks
        run: |
          ln -sf task-generator task_generator
          ln -sf subnet-adapter subnet_adapter

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run determinism checks
        env:
          ANVIL_BLOCK_TIMESTAMP: "1700000000"
          ANVIL_BLOCK_NUMBER: "18000000"
          ANVIL_GAS_LIMIT: "30000000"
          ANVIL_CHAIN_ID: "31337"
          PYTHONHASHSEED: "0"
        run: bash scripts/verify-determinism.sh

  # ── Docker E2E ───────────────────────────────────────────────────────────
  docker-e2e:
    name: Docker E2E Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Docker images
        run: |
          docker build -t exploit-subnet/validator:test -f docker/Dockerfile.validator .
          docker build -t exploit-subnet/miner:test -f docker/Dockerfile.miner .

      - name: Verify validator image
        run: |
          docker run --rm exploit-subnet/validator:test \
            python3 -c "import validator.engine.validate; print('validator OK')"

      - name: Verify miner image
        run: |
          docker run --rm exploit-subnet/miner:test \
            python3 -c "import miner.cli; print('miner OK')"

      - name: Run validation pipeline in sandbox
        run: |
          docker run --rm \
            --network=none \
            -e PYTHONHASHSEED=0 \
            -e ANVIL_BLOCK_TIMESTAMP=1700000000 \
            -e ANVIL_BLOCK_NUMBER=18000000 \
            -e ANVIL_GAS_LIMIT=30000000 \
            -e ANVIL_CHAIN_ID=31337 \
            exploit-subnet/validator:test \
            python3 -m pytest tests/test_pipeline.py -v --timeout=120

  # ── Solidity Lint ────────────────────────────────────────────────────────
  lint-solidity:
    name: Solidity Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly-2024-12-01

      - name: Check formatting
        run: forge fmt --check

      - name: Compile with warnings as errors
        run: forge build 2>&1 | tee /tmp/build.log
        continue-on-error: true

      - name: Check for compiler warnings
        run: |
          if grep -q "Warning" /tmp/build.log; then
            echo "::warning::Compiler warnings found"
            grep "Warning" /tmp/build.log
          fi

  # ── Python Lint & Type Check ─────────────────────────────────────────────
  lint-python:
    name: Python Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff black mypy

      - name: Create module symlinks
        run: |
          ln -sf task-generator task_generator
          ln -sf subnet-adapter subnet_adapter

      - name: Ruff check
        run: ruff check .

      - name: Black format check
        run: black --check --diff .

      - name: Mypy type check
        run: mypy --ignore-missing-imports .

  # ── Test Coverage ────────────────────────────────────────────────────────
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly-2024-12-01
          cache: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Create module symlinks
        run: |
          ln -sf task-generator task_generator
          ln -sf subnet-adapter subnet_adapter

      - name: Run tests with coverage
        run: |
          PYTHONHASHSEED=0 python -m pytest tests/ \
            --cov=validator --cov=orchestrator --cov=miner \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -v --timeout=120

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ── Security Scanning ────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit bandit

      - name: Create module symlinks
        run: |
          ln -sf task-generator task_generator
          ln -sf subnet-adapter subnet_adapter

      - name: Dependency audit (pip-audit)
        run: pip-audit --strict --desc on

      - name: Static security analysis (bandit)
        run: |
          bandit -r validator/ miner/ neurons/ orchestrator.py \
            -ll --format txt

  # ── Container Security ───────────────────────────────────────────────────
  container-security:
    name: Container Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build validator image
        run: docker build -t exploit-subnet/validator:scan -f docker/Dockerfile.validator .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "exploit-subnet/validator:scan"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
