# Alertmanager Configuration for VALayr Subnet
# Routes alerts from Prometheus to notification channels.

global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default-webhook"

  routes:
    - match:
        severity: critical
      receiver: "critical-webhook"
      repeat_interval: 15m

    - match:
        severity: warning
      receiver: "default-webhook"
      repeat_interval: 4h

receivers:
  - name: "default-webhook"
    webhook_configs:
      - url: "http://validator:9095/webhook"
        send_resolved: true

  - name: "critical-webhook"
    webhook_configs:
      - url: "http://validator:9095/webhook"
        send_resolved: true
    # Uncomment and configure for Slack:
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
    #     channel: '#valayr-alerts'
    #     title: '{{ .CommonAnnotations.summary }}'
    #     text: '{{ .CommonAnnotations.description }}'

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname"]
