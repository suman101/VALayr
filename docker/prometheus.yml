# Prometheus scrape configuration for VALayr subnet.
# Place in /etc/prometheus/prometheus.yml (or mount into Prometheus container).

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# ── Alertmanager Configuration ───────────────────────────────────────────────
# SECURITY: Use HTTPS with TLS for alertmanager webhooks in production.
# Configure alertmanager_config with:
#   tls_config:
#     cert_file: /etc/ssl/certs/alertmanager.crt
#     key_file: /etc/ssl/private/alertmanager.key
#     insecure_skip_verify: false
# alerting:
#   alertmanagers:
#     - scheme: https
#       tls_config:
#         ca_file: /etc/ssl/certs/ca.crt
#       static_configs:
#         - targets: ["alertmanager:9093"]

# ── Alert Rules ──────────────────────────────────────────────────────────────
rule_files:
  - "alerts.yml"

# ── Scrape Targets ───────────────────────────────────────────────────────────
scrape_configs:
  # Validator metrics (exposed by validator.metrics.MetricsServer on port 9946)
  - job_name: "valayr-validator"
    metrics_path: "/metrics"
    scrape_interval: 10s
    static_configs:
      - targets:
          - "validator:9946"
        labels:
          service: "validator"
          subnet: "valayr"

  # Consensus relay health
  - job_name: "valayr-consensus"
    metrics_path: "/health"
    scrape_interval: 30s
    static_configs:
      - targets:
          - "consensus:9946"
        labels:
          service: "consensus-relay"
          subnet: "valayr"
